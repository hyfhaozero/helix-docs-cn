# Deploy site in repo root to gh-pages (project pages)
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main        # <- 如果你的默认分支是 master，请改为 master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare site directory
        # Copy only the site files into ./public, excluding .git and .github
        run: |
          mkdir -p public
          # If your repo root is already the built site, copy everything except git metadata and workflow files
          rsync -av --delete --exclude='.git' --exclude='.github' ./ public/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # keep_files: true   # 如果你想在 gh-pages 根保留以前的文件（比如发布多个版本目录），取消注释
