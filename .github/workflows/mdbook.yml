name: Build mdBook

on:
  push:
    paths:
      - './**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - './**'

jobs:
  build:
  - name: Deploy to GitHub Pages
  uses: peaceiris/actions-gh-pages@v3
  with:
    github_token: ${{ secrets.GITHUB_TOKEN }}
    publish_dir: ./book
    publish_branch: gh-pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install mdbook
        run: |
          cargo install mdbook --locked --force
          # ensure cargo bin dir is on PATH for subsequent steps
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Debug - show repo files and find SUMMARY.md
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level:"
          ls -la
          echo "book dir contents:"
          ls -la book || true
          echo "Searching for SUMMARY.md (case-insensitive):"
          find . -maxdepth 6 -type f -iname 'SUMMARY.md' -print || true

      - name: Build book with mdbook
        working-directory: ./
        run: |
          mdbook build
