- name: Checkout repo
  uses: actions/checkout@v4

- name: Debug - list files and find SUMMARY.md
  run: |
    pwd
    echo "Top-level:"
    ls -la
    echo "book dir:"
    ls -la book || true
    echo "search for SUMMARY.md:"
    find . -maxdepth 6 -type f -iname 'SUMMARY.md' -print || true

- name: Install mdbook (adjust if you have a different setup)
  run: |
    cargo install mdbook

- name: Build book with mdbook
  working-directory: ./book
  run: mdbook build
