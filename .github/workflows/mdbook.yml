name: Build and deploy mdBook to GitHub Pages
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workspace (list files)
        run: |
          echo "Workspace root:"
          ls -la
          echo "src directory:"
          ls -la src || true
          echo "book.toml:"
          [ -f book.toml ] && echo "book.toml exists" || echo "book.toml not found"

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install mdBook
        run: |
          cargo install mdbook --locked --version 0.4.34 || true

      - name: Build mdBook
        run: |
          mdbook build -d book

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./book

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
